<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Ride Booker</title>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .content { padding: 20px; min-height: 300px; }
        .screen { display: none; }
        .active { display: block; }
        
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .status-box { padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center; }
        .searching { background: #fff3cd; color: #856404; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.6; } }
        .receipt { border-top: 2px dashed #ddd; margin-top: 15px; padding-top: 15px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">BOOK RIDE TO SCHOOL</div>
    <div class="content">

        <div id="screen-reg" class="screen active">
            <h3>Are you registered?</h3>
            <button class="btn-primary" onclick="showScreen('screen-ride')">YES</button>
            <button class="btn-secondary" onclick="showScreen('screen-signup')">NO</button>
        </div>

        <div id="screen-signup" class="screen">
            <h3>Sign Up</h3>
            <p>Enter 10-digit Phone (starts with 9):</p>
            <input type="number" id="phoneInput" placeholder="9123456789">
            <button class="btn-primary" onclick="handleSignup()">Log In</button>
        </div>

        <div id="screen-ride" class="screen">
            <h3>Are you late for school?</h3>
            <button class="btn-secondary" onclick="startSearch(true)">YES (Angkas/Motor)</button>
            <button class="btn-primary" onclick="startSearch(false)">NO (Grab/Car)</button>
        </div>

        <div id="screen-search" class="screen">
            <div class="status-box searching" id="searchMsg">Searching for driver...</div>
            <div id="search-fail" style="display:none; text-align:center;">
                <p>No driver found.</p>
                <button class="btn-secondary" onclick="showScreen('screen-ride')">Try Again</button>
            </div>
        </div>

        <div id="screen-loc" class="screen">
            <h3>Select Route</h3>
            <label>Current Location:</label>
            <select id="locID">
                <option value="1">Vigan City</option>
                <option value="2">UNP</option>
                <option value="3">Caoayan</option>
                <option value="4">Bantay</option>
                <option value="5">Sta. Catalina</option>
            </select>
            <label>Destination:</label>
            <select id="destID">
                <option value="2">UNP</option>
                <option value="1">Vigan City</option>
                <option value="3">Caoayan</option>
                <option value="4">Bantay</option>
                <option value="5">Sta. Catalina</option>
            </select>
            <button class="btn-primary" onclick="calculateFare()">Next: Payment</button>
        </div>

        <div id="screen-pay" class="screen">
            <h3>Payment Method</h3>
            <button class="btn-primary" onclick="showFinal('Online')">Online (GCash/Paymaya)</button>
            <button class="btn-secondary" onclick="showFinal('Cash')">Cash on Arrival</button>
        </div>

        <div id="screen-final" class="screen">
            <div class="receipt" id="receiptContent">
                </div>
            <button class="btn-primary" onclick="location.reload()">Book Another Ride</button>
        </div>

    </div>
</div>

<script>
    let vehicle = "";
    let fare = 0;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleSignup() {
        const phone = document.getElementById('phoneInput').value;
        if (phone.startsWith('9') && phone.length === 10) {
            showScreen('screen-ride');
        } else {
            alert("Invalid! Must be 10 digits starting with 9.");
        }
    }

    function startSearch(isLate) {
        vehicle = isLate ? "ANGKAS (Motorcycle)" : "GRAB (Car)";
        showScreen('screen-search');
        document.getElementById('search-fail').style.display = 'none';
        document.getElementById('searchMsg').style.display = 'block';

        // Simulate random availability logic from your C++ (50/50 chance)
        setTimeout(() => {
            if (Math.random() > 0.5) {
                showScreen('screen-loc');
            } else {
                document.getElementById('searchMsg').style.display = 'none';
                document.getElementById('search-fail').style.display = 'block';
            }
        }, 1500);
    }

    function calculateFare() {
        const loc = parseInt(document.getElementById('locID').value);
        const dest = parseInt(document.getElementById('destID').value);
        
        const distance = Math.abs(loc - dest);
        fare = distance * 15;
        showScreen('screen-pay');
    }

    function showFinal(method) {
        const locText = document.getElementById('locID').options[document.getElementById('locID').selectedIndex].text;
        const destText = document.getElementById('destID').options[document.getElementById('destID').selectedIndex].text;
        
        document.getElementById('receiptContent').innerHTML = `
            <strong>RIDE DETAILS</strong><br>
            Route: ${locText} to ${destText}<br>
            Vehicle: ${vehicle}<br>
            Payment: ${method}<br>
            <strong>Total Fare: ₱${fare}</strong><br>
            <p style="color:green; text-align:center;"><b>Status: Arrived Safely!</b></p>
        `;
        showScreen('screen-final');
    }
</script>

</body>
</html>
